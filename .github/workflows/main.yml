name: Build (Modular)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  gatekeeper:
    name: Build Trigger Check
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.check.outputs.build }}
    steps:
      - name: Check commit/PR title for build trigger
        id: check
        shell: bash
        run: |
          set -euo pipefail
          echo "build=false" >> "$GITHUB_OUTPUT"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          msg=""
          if [[ "${{ github.event_name }}" == "push" ]]; then
            msg="${{ github.event.head_commit.message }}"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            msg="${{ github.event.pull_request.title }}"
          fi

          if echo "$msg" | grep -Eq "\\[build\\]"; then
            echo "build=true" >> "$GITHUB_OUTPUT"
          fi

  build-android:
    name: Build Android
    needs: gatekeeper
    if: needs.gatekeeper.outputs.build == 'true'
    uses: ./.github/workflows/build-android.yml

  build-ios:
    name: Build iOS
    needs: gatekeeper
    if: needs.gatekeeper.outputs.build == 'true'
    uses: ./.github/workflows/build-ios.yml

  build-macos:
    name: Build macOS
    needs: gatekeeper
    if: needs.gatekeeper.outputs.build == 'true'
    uses: ./.github/workflows/build-macos.yml

  build-windows:
    name: Build Windows
    needs: gatekeeper
    if: needs.gatekeeper.outputs.build == 'true'
    uses: ./.github/workflows/build-windows.yml

  build-linux:
    name: Build Linux
    needs: gatekeeper
    if: needs.gatekeeper.outputs.build == 'true'
    uses: ./.github/workflows/build-linux.yml

  release:
    name: Publish Release
    needs:
      - gatekeeper
      - build-android
      - build-ios
      - build-macos
      - build-windows
      - build-linux
    if: needs.gatekeeper.outputs.build == 'true' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read app version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          if [ -z "$VERSION" ]; then
            echo "version is empty"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist

      - name: Publish GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          allowUpdates: true
          replacesArtifacts: true
          artifacts: dist/*
          token: ${{ secrets.GITHUB_TOKEN }}
