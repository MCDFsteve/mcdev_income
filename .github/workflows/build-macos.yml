name: Build macOS

on:
  workflow_call:
    outputs:
      artifact-name:
        description: macOS artifact name
        value: ${{ jobs.build.outputs.artifact-name }}

jobs:
  build:
    name: Build macOS
    runs-on: macos-latest
    outputs:
      artifact-name: macos-app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build macOS (release)
        run: flutter build macos --release

      - name: Package macOS app
        run: |
          set -euo pipefail
          RELEASE_DIR="build/macos/Build/Products/Release"
          APP_DIR=$(find "$RELEASE_DIR" -maxdepth 1 -type d -name "*.app" | head -n 1)
          if [ -z "$APP_DIR" ]; then
            echo "No .app bundle found in $RELEASE_DIR"
            ls -la "$RELEASE_DIR"
            exit 1
          fi
          APP_NAME=$(basename "$APP_DIR")
          cd "$RELEASE_DIR"
          zip -r macos-app.zip "$APP_NAME"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: build/macos/Build/Products/Release/macos-app.zip
